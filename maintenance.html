<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>middaypuppy.exe - Uh oh!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" sizes="512x512" href="/images/puppyboypfp.png" />
<link rel="apple-touch-icon" href="/images/puppyboypfp.png" />
<meta name="theme-color" content="#fff0f7" id="themeColorMeta" />

<style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap");

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  font-family:"Montserrat",sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.9), transparent 40%),
    radial-gradient(circle at 20% 20%, rgba(255,200,230,.4), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(200,230,255,.4), transparent 25%),
    linear-gradient(180deg,#fff4fb,#ffeaf6);
  overflow:hidden;
  color:#6d5a79;
}

/* sparkles */
.sparkles{
  position:absolute;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.9) 1.5px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 2px);
  background-size:120px 120px, 160px 160px;
  animation: float 10s linear infinite;
  opacity:.6;
}

@keyframes float{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-20px); }
  100%{ transform:translateY(0); }
}

.card{
  background:rgba(255,255,255,.7);
  border:1px solid rgba(255,180,215,.35);
  border-radius:28px;
  padding:40px 32px;
  width:min(420px,90%);
  text-align:center;
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(255,182,215,.25);
}

.title{
  font-weight:800;
  letter-spacing:.1em;
  font-size:1.4rem;
  color:#ffb6c1;
  text-shadow:0 0 14px rgba(255,190,230,.7);
}

.subtitle{
  margin-top:8px;
  font-size:.8rem;
  letter-spacing:.18em;
  color:rgba(120,100,140,.7);
}

.status{
  margin-top:28px;
  font-size:.95rem;
  font-weight:600;
}

.status span{
  color:#ff9ed1;
}

/* 🐾 PUPPY LOADER */
.puppy-loader{
  position: relative;
  width: 132px;
  height: 132px;
  margin: 26px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: puppyFloat 3.2s ease-in-out infinite;
}

.puppy-face{
  width: 104px;
  height: 104px;
  object-fit: cover;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,.72);
  box-shadow:
    0 10px 28px rgba(255,182,215,.26),
    0 0 22px rgba(255,255,255,.55);
}

/* 🐾 CUSTOM TAIL */
.tail-widget{
  position: fixed;
  bottom: -120px;
  right: 18px;
  width: 90px;
  height: 140px;
  z-index: 100;
  cursor: pointer;

  animation:
    tailPopIn 0.9s cubic-bezier(.2,.8,.2,1) forwards,
    tailIdle 2.8s ease-in-out infinite 1s;

  filter:
    drop-shadow(0 10px 18px rgba(255,182,215,.4))
    drop-shadow(0 0 14px rgba(200,230,255,.6));
}

/* segments */
.tail{
  position: relative;
  width: 100%;
  height: 100%;
}

.tail-seg{
  position: absolute;
  left: 50%;
  transform-origin: bottom center;
  border-radius: 50%;
}

.seg1{
  bottom: 0;
  width: 38px;
  height: 60px;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #ffb3d8, #ff8fc8);
}

.seg2{
  bottom: 42px;
  width: 32px;
  height: 55px;
  transform: translateX(-50%) rotate(12deg);
  background: linear-gradient(180deg, #bde3ff, #8fd2ff);
}

.seg3{
  bottom: 82px;
  width: 26px;
  height: 48px;
  transform: translateX(-50%) rotate(20deg);
  background: linear-gradient(180deg, #ffd6ee, #caa6ff);
}

/* animations */
@keyframes tailPopIn{
  to{ bottom: 14px; }
}

@keyframes tailIdle{
  0%,100%{ transform: rotate(0deg); }
  50%{ transform: rotate(8deg); }
}

.tail-widget:hover{
  animation: tailExcited .6s ease-in-out infinite;
}

@keyframes tailExcited{
  0%,100%{ transform: rotate(0deg) scale(1.05); }
  50%{ transform: rotate(14deg) scale(1.1); }
}

.tail-widget.dance{
  animation: tailDance 0.4s ease-in-out infinite;
}

@keyframes tailDance{
  0%{ transform: rotate(0deg); }
  25%{ transform: rotate(18deg); }
  50%{ transform: rotate(-18deg); }
  75%{ transform: rotate(12deg); }
  100%{ transform: rotate(0deg); }
}

@keyframes puppyFloat{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(-4px); }
}

.msg{
  margin-top:20px;
  font-size:.85rem;
  color:rgba(120,100,140,.75);
}

.heart{
  margin-top:12px;
  font-size:1.4rem;
  animation: pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.2); }
}
</style>
</head>

<body>
<div class="sparkles"></div>

<div class="card">
  <div class="title">middaypuppy.exe</div>
  <div class="subtitle">SYSTEM: gently restoring</div>

  <div class="status">
    please wait… <span>new stuffs incoming!</span>
  </div>

  <div class="puppy-loader">
    <img src="/images/puppyboypfp.png" class="puppy-face" />
  </div>

  <div class="msg" id="msg">
    we will be here soon ♡ please check back later
  </div>

  <div class="heart">♡</div>
</div>

<!-- 🐾 CUSTOM TAIL -->
<div class="tail-widget" id="tail">
  <div class="tail">
    <div class="tail-seg seg1"></div>
    <div class="tail-seg seg2"></div>
    <div class="tail-seg seg3"></div>
  </div>
</div>

<script>
const tail = document.getElementById("tail");

tail.addEventListener("click", () => {
  tail.classList.add("dance");
  setTimeout(() => {
    tail.classList.remove("dance");
  }, 800);
});
</script>
</body>
</html>
