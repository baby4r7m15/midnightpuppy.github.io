<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>middaypuppy.exe - Uh oh!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" sizes="512x512" href="/images/puppyboypfp.png" />
<link rel="apple-touch-icon" href="/images/puppyboypfp.png" />
<meta name="theme-color" content="#fff0f7" id="themeColorMeta" />

<style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap");

* { margin: 0; padding: 0; box-sizing: border-box; }

body{
  font-family:"Montserrat",sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.9), transparent 40%),
    radial-gradient(circle at 20% 20%, rgba(255,200,230,.4), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(200,230,255,.4), transparent 25%),
    linear-gradient(180deg,#fff4fb,#ffeaf6);
  overflow:hidden;
  color:#6d5a79;
}

.sparkles{
  position:absolute;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.9) 1.5px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 2px);
  background-size:120px 120px, 160px 160px;
  animation: float 10s linear infinite;
  opacity:.6;
}

@keyframes float{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-20px); }
  100%{ transform:translateY(0); }
}

.card{
  background:rgba(255,255,255,.7);
  border:1px solid rgba(255,180,215,.35);
  border-radius:28px;
  padding:40px 32px;
  width:min(420px,90%);
  text-align:center;
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(255,182,215,.25);
  position:relative;
  z-index:2;
}

.title{
  font-weight:800;
  letter-spacing:.1em;
  font-size:1.4rem;
  color:#ffb6c1;
  text-shadow:0 0 14px rgba(255,190,230,.7);
}

.subtitle{
  margin-top:8px;
  font-size:.8rem;
  letter-spacing:.18em;
  color:rgba(120,100,140,.7);
}

.status{
  margin-top:28px;
  font-size:.95rem;
  font-weight:600;
}

.status span{
  color:#ff9ed1;
}

.puppy-loader{
  position: relative;
  width: 132px;
  height: 132px;
  margin: 26px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: puppyFloat 3.2s ease-in-out infinite;
}

.puppy-face{
  position: relative;
  z-index: 3;
  width: 104px;
  height: 104px;
  object-fit: cover;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,.72);
  box-shadow:
    0 10px 28px rgba(255,182,215,.26),
    0 0 22px rgba(255,255,255,.55);
  background: rgba(255,255,255,.55);
}

.puppy-ear{
  position: absolute;
  top: 6px;
  width: 44px;
  height: 58px;
  z-index: 1;
  background: linear-gradient(180deg, #d7a889 0%, #bf8769 100%);
  border: 3px solid rgba(255,255,255,.35);
  box-shadow:
    0 8px 18px rgba(255,182,215,.16),
    inset 0 2px 8px rgba(255,255,255,.18);
}

.puppy-ear::after{
  content:"";
  position:absolute;
  inset: 9px 8px 13px 8px;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,220,230,.72), rgba(255,205,220,.45));
  opacity: .55;
}

.ear-left{
  left: 16px;
  transform-origin: top center;
  border-radius: 55% 45% 70% 70%;
  animation: floppyLeft 2.2s ease-in-out infinite;
}

.ear-right{
  right: 16px;
  transform-origin: top center;
  border-radius: 45% 55% 70% 70%;
  animation: floppyRight 2.2s ease-in-out infinite;
}

@keyframes floppyLeft{
  0%,100%{ transform: rotate(-18deg); }
  50%{ transform: rotate(-30deg); }
}

@keyframes floppyRight{
  0%,100%{ transform: rotate(18deg); }
  50%{ transform: rotate(30deg); }
}

@keyframes puppyFloat{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(-4px); }
}

.msg{
  margin-top:20px;
  font-size:.85rem;
  color:rgba(120,100,140,.75);
}

.heart{
  margin-top:12px;
  font-size:1.4rem;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.2); }
}

/* Fluid tail */
.tail-widget{
  position: fixed;
  right: 0;
  bottom: 0;
  width: 220px;
  height: 220px;
  z-index: 30;
  pointer-events: auto;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.tail-shell{
  position: absolute;
  right: -8px;
  bottom: -170px;
  width: 220px;
  height: 220px;
  opacity: 0;
  animation: tailPopIn .9s cubic-bezier(.22,.86,.2,1) forwards;
}

.tail-glow{
  position:absolute;
  inset: 48px 20px 0 48px;
  border-radius:50%;
  background:
    radial-gradient(circle at 45% 55%,
      rgba(255, 216, 234, .45) 0%,
      rgba(255, 195, 220, .25) 28%,
      rgba(255,255,255,.14) 55%,
      transparent 78%);
  filter: blur(18px);
  pointer-events:none;
  animation: glowPulse 2.6s ease-in-out infinite;
}

.tail-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  filter:
    drop-shadow(0 12px 20px rgba(255,182,215,.25))
    drop-shadow(0 0 18px rgba(255,240,246,.5));
}

.tail-burst{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.tail-burst span{
  position:absolute;
  right:74px;
  bottom:60px;
  width:10px;
  height:10px;
  border-radius:50%;
  opacity:0;
  background: radial-gradient(circle, #fff 0%, #ffddea 55%, #fff8fb 100%);
  box-shadow:
    0 0 10px rgba(255,255,255,.9),
    0 0 16px rgba(255,196,223,.65);
}

.tail-widget.bursting .tail-burst span:nth-child(1){ animation: burst1 .55s ease-out; }
.tail-widget.bursting .tail-burst span:nth-child(2){ animation: burst2 .55s ease-out; }
.tail-widget.bursting .tail-burst span:nth-child(3){ animation: burst3 .55s ease-out; }
.tail-widget.bursting .tail-burst span:nth-child(4){ animation: burst4 .55s ease-out; }

@keyframes tailPopIn{
  0%{
    transform: translateY(150px) scale(.86);
    opacity: 0;
  }
  70%{
    transform: translateY(-8px) scale(1.03);
    opacity: 1;
  }
  100%{
    transform: translateY(0) scale(1);
    opacity: 1;
    bottom: 0;
  }
}

@keyframes glowPulse{
  0%,100%{ opacity:.55; transform:scale(.96); }
  50%{ opacity:.95; transform:scale(1.06); }
}

@keyframes burst1{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(-26px,-28px) scale(1.15); }
}
@keyframes burst2{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(18px,-34px) scale(1.1); }
}
@keyframes burst3{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(-18px,12px) scale(.95); }
}
@keyframes burst4{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(26px,6px) scale(.9); }
}

@media (max-width: 700px){
  .tail-widget,
  .tail-shell{
    width: 170px;
    height: 170px;
  }

  .tail-shell{
    bottom: -135px;
  }
}
</style>
</head>

<body>
<div class="sparkles"></div>

<div class="card">
  <div class="title">middaypuppy.exe</div>
  <div class="subtitle">SYSTEM: gently restoring</div>

  <div class="status">
    please wait… <span>new stuffs incoming!</span>
  </div>

  <div class="puppy-loader">
    <div class="puppy-ear ear-left"></div>
    <div class="puppy-ear ear-right"></div>
    <img src="/images/puppyboypfp.png" alt="middaypuppy puppy avatar" class="puppy-face" />
  </div>

  <div class="msg" id="msg">
    we will be here soon ♡ please check back later
  </div>

  <div class="heart">♡</div>
</div>

<div class="tail-widget" id="tail" aria-label="fluid puppy tail">
  <div class="tail-shell">
    <div class="tail-glow"></div>
    <canvas id="tailCanvas" class="tail-canvas" width="220" height="220"></canvas>
    <div class="tail-burst">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
</div>

<script>
document.getElementById("msg").textContent =
  "we will be here soon ♡ please check back later";

const tailWidget = document.getElementById("tail");
const canvas = document.getElementById("tailCanvas");
const ctx = canvas.getContext("2d");

const state = {
  mouseX: window.innerWidth * 0.5,
  mouseY: window.innerHeight * 0.5,
  hover: false,
  danceUntil: 0,
  popDone: false,
  time: 0
};

const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.round(rect.width * DPR);
  canvas.height = Math.round(rect.height * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

setTimeout(() => {
  state.popDone = true;
}, 950);

document.addEventListener("mousemove", (e) => {
  state.mouseX = e.clientX;
  state.mouseY = e.clientY;
});

tailWidget.addEventListener("mouseenter", () => {
  state.hover = true;
});

tailWidget.addEventListener("mouseleave", () => {
  state.hover = false;
});

tailWidget.addEventListener("click", () => {
  state.danceUntil = performance.now() + 900;
  tailWidget.classList.remove("bursting");
  void tailWidget.offsetWidth;
  tailWidget.classList.add("bursting");
  setTimeout(() => tailWidget.classList.remove("bursting"), 560);
});

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function smoothstep(edge0, edge1, x) {
  const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

function drawTail(now) {
  const rect = canvas.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;

  ctx.clearRect(0, 0, w, h);

  state.time = now * 0.001;

  const anchorX = w - 36;
  const anchorY = h - 26;

  const pageAnchorX = rect.left + anchorX;
  const pageAnchorY = rect.top + anchorY;

  const dx = state.mouseX - pageAnchorX;
  const dy = state.mouseY - pageAnchorY;
  const dist = Math.hypot(dx, dy);

  const react = 1 - clamp(dist / 280, 0, 1);
  const proximity = smoothstep(0, 1, react);
  const dance = now < state.danceUntil ? 1 : 0;
  const hoverBoost = state.hover ? 1 : 0;

  const baseAngle =
    -2.05
    + Math.sin(state.time * 2.2) * 0.12
    + proximity * 0.34
    + hoverBoost * 0.18
    + dance * Math.sin(state.time * 22) * 0.28;

  const curve1 =
    -0.95
    + Math.sin(state.time * 2.5 + 0.5) * 0.16
    + proximity * 0.28
    + hoverBoost * 0.16
    + dance * Math.sin(state.time * 24 + 0.7) * 0.25;

  const curve2 =
    -1.55
    + Math.sin(state.time * 2.8 + 1.4) * 0.19
    + proximity * 0.36
    + hoverBoost * 0.18
    + dance * Math.sin(state.time * 26 + 1.1) * 0.32;

  const lift =
    Math.sin(state.time * 1.8) * 4
    + proximity * 8
    + hoverBoost * 6
    + dance * Math.sin(state.time * 16) * 5;

  const length = w < 190 ? 112 : 140;

  const p0 = { x: anchorX, y: anchorY - lift * 0.35 };
  const p1 = {
    x: p0.x + Math.cos(baseAngle) * (length * 0.38),
    y: p0.y + Math.sin(baseAngle) * (length * 0.38)
  };
  const p2 = {
    x: p1.x + Math.cos(curve1) * (length * 0.34),
    y: p1.y + Math.sin(curve1) * (length * 0.34)
  };
  const p3 = {
    x: p2.x + Math.cos(curve2) * (length * 0.28),
    y: p2.y + Math.sin(curve2) * (length * 0.28)
  };

  const spine = sampleBezier(p0, p1, p2, p3, 34);

  const leftPts = [];
  const rightPts = [];

  for (let i = 0; i < spine.length; i++) {
    const pt = spine[i];
    const prev = spine[Math.max(0, i - 1)];
    const next = spine[Math.min(spine.length - 1, i + 1)];
    const tangentX = next.x - prev.x;
    const tangentY = next.y - prev.y;
    const len = Math.hypot(tangentX, tangentY) || 1;
    const nx = -tangentY / len;
    const ny = tangentX / len;

    const t = i / (spine.length - 1);
    const baseWidth = lerp(20, 5.8, t);
    const fluff = (1 - t) * 1.4 + Math.sin(state.time * 4 + i * 0.8) * 0.5;
    const width = baseWidth + fluff;

    leftPts.push({ x: pt.x + nx * width, y: pt.y + ny * width });
    rightPts.push({ x: pt.x - nx * width, y: pt.y - ny * width });
  }

  drawOuterGlow(leftPts, rightPts);
  drawTailShape(leftPts, rightPts, spine);
  drawCenterHighlight(spine);
  drawTipFluff(p3, spine[spine.length - 2]);
  drawFurStrands(leftPts, rightPts, spine, now);
  drawBaseSoftShadow(anchorX, anchorY);

  requestAnimationFrame(drawTail);
}

function sampleBezier(p0, p1, p2, p3, count) {
  const pts = [];
  for (let i = 0; i <= count; i++) {
    const t = i / count;
    const mt = 1 - t;
    const x =
      mt * mt * mt * p0.x +
      3 * mt * mt * t * p1.x +
      3 * mt * t * t * p2.x +
      t * t * t * p3.x;
    const y =
      mt * mt * mt * p0.y +
      3 * mt * mt * t * p1.y +
      3 * mt * t * t * p2.y +
      t * t * t * p3.y;
    pts.push({ x, y });
  }
  return pts;
}

function roundedPolygon(points) {
  if (!points.length) return;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for (let i = 1; i < points.length - 1; i++) {
    const cx = (points[i].x + points[i + 1].x) * 0.5;
    const cy = (points[i].y + points[i + 1].y) * 0.5;
    ctx.quadraticCurveTo(points[i].x, points[i].y, cx, cy);
  }

  const last = points[points.length - 1];
  ctx.lineTo(last.x, last.y);
}

function buildTailPath(leftPts, rightPts) {
  ctx.beginPath();
  roundedPolygon(leftPts);

  for (let i = rightPts.length - 1; i > 0; i--) {
    const curr = rightPts[i];
    const prev = rightPts[i - 1];
    const cx = (curr.x + prev.x) * 0.5;
    const cy = (curr.y + prev.y) * 0.5;
    ctx.quadraticCurveTo(curr.x, curr.y, cx, cy);
  }

  ctx.closePath();
}

function drawOuterGlow(leftPts, rightPts) {
  ctx.save();
  buildTailPath(leftPts, rightPts);
  ctx.shadowBlur = 24;
  ctx.shadowColor = "rgba(255, 213, 231, .55)";
  ctx.fillStyle = "rgba(255, 237, 245, .28)";
  ctx.fill();
  ctx.restore();
}

function drawTailShape(leftPts, rightPts, spine) {
  ctx.save();
  buildTailPath(leftPts, rightPts);

  const gradient = ctx.createLinearGradient(
    spine[0].x, spine[0].y,
    spine[spine.length - 1].x, spine[spine.length - 1].y
  );
  gradient.addColorStop(0, "#c89268");
  gradient.addColorStop(0.18, "#d9a57f");
  gradient.addColorStop(0.42, "#efc6b7");
  gradient.addColorStop(0.72, "#ffdbe9");
  gradient.addColorStop(1, "#fffafc");

  ctx.fillStyle = gradient;
  ctx.fill();

  const sheen = ctx.createRadialGradient(
    spine[8].x, spine[8].y,
    2,
    spine[8].x, spine[8].y,
    54
  );
  sheen.addColorStop(0, "rgba(255,255,255,.55)");
  sheen.addColorStop(.38, "rgba(255,240,246,.18)");
  sheen.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = sheen;
  ctx.fill();

  ctx.lineWidth = 1.2;
  ctx.strokeStyle = "rgba(255,255,255,.24)";
  ctx.stroke();

  ctx.restore();
}

function drawCenterHighlight(spine) {
  ctx.save();
  ctx.beginPath();

  for (let i = 0; i < spine.length; i++) {
    const p = spine[i];
    const wobble = Math.sin(state.time * 3 + i * 0.45) * 1.1;
    const x = p.x + 2 - i * 0.03;
    const y = p.y - 1.5 + wobble * 0.15;

    if (i === 0) ctx.moveTo(x, y);
    else {
      const prev = spine[i - 1];
      const px = prev.x + 2 - (i - 1) * 0.03;
      const py = prev.y - 1.5;
      ctx.quadraticCurveTo(px, py, (px + x) / 2, (py + y) / 2);
    }
  }

  ctx.strokeStyle = "rgba(255,255,255,.42)";
  ctx.lineWidth = 2.1;
  ctx.lineCap = "round";
  ctx.shadowBlur = 8;
  ctx.shadowColor = "rgba(255,255,255,.25)";
  ctx.stroke();
  ctx.restore();
}

function drawTipFluff(tip, nearTip) {
  const angle = Math.atan2(tip.y - nearTip.y, tip.x - nearTip.x);
  ctx.save();
  ctx.translate(tip.x, tip.y);
  ctx.rotate(angle);

  for (let i = 0; i < 7; i++) {
    const spread = -0.75 + i * 0.24;
    const len = 16 + (i % 2) * 4;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(
      Math.cos(spread) * (len * 0.45),
      Math.sin(spread) * (len * 0.45),
      Math.cos(spread) * len,
      Math.sin(spread) * len
    );
    ctx.strokeStyle = i < 5 ? "rgba(255,255,255,.88)" : "rgba(255,241,247,.8)";
    ctx.lineWidth = 2.2 - i * 0.14;
    ctx.lineCap = "round";
    ctx.stroke();
  }

  const puff = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
  puff.addColorStop(0, "rgba(255,255,255,.95)");
  puff.addColorStop(.55, "rgba(255,247,250,.78)");
  puff.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = puff;
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawFurStrands(leftPts, rightPts, spine, now) {
  ctx.save();
  ctx.lineCap = "round";

  for (let i = 3; i < spine.length - 2; i += 2) {
    const t = i / (spine.length - 1);
    const pt = spine[i];
    const prev = spine[i - 1];
    const next = spine[i + 1];
    const tx = next.x - prev.x;
    const ty = next.y - prev.y;
    const len = Math.hypot(tx, ty) || 1;
    const nx = -ty / len;
    const ny = tx / len;

    const furLen = lerp(6, 2.5, t) + Math.sin(now * 0.008 + i) * 0.4;

    const leftBase = leftPts[i];
    const rightBase = rightPts[i];

    ctx.strokeStyle = t > 0.72 ? "rgba(255,255,255,.58)" : "rgba(255, 238, 244, .32)";
    ctx.lineWidth = t > 0.7 ? 1.15 : 0.85;

    ctx.beginPath();
    ctx.moveTo(leftBase.x, leftBase.y);
    ctx.lineTo(leftBase.x + nx * furLen, leftBase.y + ny * furLen);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(rightBase.x, rightBase.y);
    ctx.lineTo(rightBase.x - nx * furLen, rightBase.y - ny * furLen);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBaseSoftShadow(x, y) {
  ctx.save();
  const shadow = ctx.createRadialGradient(x - 6, y - 4, 4, x - 6, y - 4, 28);
  shadow.addColorStop(0, "rgba(188, 125, 104, .20)");
  shadow.addColorStop(.55, "rgba(255, 189, 213, .10)");
  shadow.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.arc(x - 6, y - 4, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

requestAnimationFrame(drawTail);
</script>

</body>
</html>
