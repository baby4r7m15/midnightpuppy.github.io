<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>middaypuppy.exe</title>

<link rel="stylesheet" href="/css/middaypuppy-bio.css">
<link rel="icon" href="/images/puppyboypfp.png">
</head>

<body>

<header class="hud-top">
  <div>
    <div class="hud-title" id="siteTitle">middaypuppy.exe</div>
    <div class="hud-sub" id="siteSubtitle"></div>
  </div>
</header>

<main class="grid">

<section class="panel profile">
  <div class="panel-head">
    <span>USER PROFILE</span>
    <span class="chip">ONLINE</span>
  </div>

  <div class="avatar">
    <img src="/images/puppyboypfp.png">
  </div>

  <div id="profileName"></div>
  <div id="profileMeta"></div>

  <ul id="loadoutList"></ul>
</section>

<section class="panel quest">
  <div class="panel-head">BIO LOG</div>
  <ul id="bioLogList"></ul>
</section>

<section class="panel party">
  <div class="panel-head">Stats</div>
  <div id="statsCards"></div>
</section>

<section class="panel battle">
  <div class="panel-head">STATUS REPORT</div>
  <ul class="list" id="statusReportList"></ul>
</section>

<section class="panel syslog">
  <div class="panel-head">SYSTEM LOG</div>
  <div class="terminal" id="systemLogLines"></div>
</section>

</main>

<div class="sao-toast" id="toast">
  <div class="sao-toast-header">SYSTEM</div>
  <div id="toastType"></div>
  <button id="toastClose">✕</button>
</div>

<script>
fetch("/data/middaypuppy.json").then(r=>r.json()).then(data=>{

document.getElementById("siteSubtitle").textContent=data.header.subtitle;
document.getElementById("profileName").textContent=data.profile.name;
document.getElementById("profileMeta").innerHTML=data.profile.metaHtml;

document.getElementById("loadoutList").innerHTML=
data.profile.loadout.map(i=>`<li>${i}</li>`).join("");

document.getElementById("bioLogList").innerHTML=
data.bio.entries.map(e=>`<li>${e.text}</li>`).join("");

document.getElementById("statsCards").innerHTML=
data.statsPanel.cards.map(c=>`
<div class="member">
${c.name}
<div class="m-bar"><div class="m-fill" style="width:${c.percent}%"></div></div>
</div>`).join("");

document.getElementById("statusReportList").innerHTML=
data.statusReport.items.map(i=>`<li>${i}</li>`).join("");

document.getElementById("systemLogLines").innerHTML=
data.systemLog.lines.map(l=> l.type==="gap"?"<br>":
`<div class="term-line"><span class="term-time">${l.time}</span>${l.message}</div>`).join("");

/* TYPE TOAST */
let text=data.toast.line;
let i=0;
function type(){
  document.getElementById("toastType").textContent=text.slice(0,i++);
  if(i<=text.length) setTimeout(type,20);
}
type();

/* CLOSE */
setTimeout(()=>document.getElementById("toast").remove(),7000);
document.getElementById("toastClose").onclick=()=>document.getElementById("toast").remove();

});
</script>

</body>
</html>
